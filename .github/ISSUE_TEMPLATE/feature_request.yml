name: Feature request
description: Suggest a new tool, capability, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: input
    id: faxdrop-endpoint
    attributes:
      label: FaxDrop API endpoint (if applicable)
      placeholder: "POST /api/send-fax"
